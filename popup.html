<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auto Next Page Reader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h2>
      <i>📖</i>
  Auto Next Page Reader
    </h2>
  </header>

  <main class="popup-container">
    <button id="start" class="control-btn primary">
      <i>▶</i>
      Start Reading
    </button>

    <button id="stop" class="control-btn danger" disabled>
      <i>⏹</i>
      Stop
    </button>

    <button id="forward" class="control-btn toggle" disabled>
      <i>⏩</i>
      Skip Forward
    </button>

    <button id="toggle" class="control-btn toggle">
      <i>↪</i>
      Auto Next ON
    </button>

    <button id="toggleAutoRead" class="control-btn toggle">
      <i>🗣</i>
      Auto Read ON
    </button>

    <button id="toggleAutoScroll" class="control-btn toggle">
      <i>🡳</i>
      Auto Scroll OFF
    </button>

    <!-- Voice Selection -->
    <section class="tts-controls" style="margin-top:4px;">
      <div class="control-row">
        <label for="englishVoice" style="font-size:11px;">Voice</label>
        <select id="englishVoice" style="width:100%;padding:4px 6px;font-size:11px;border:1px solid #555;border-radius:4px;background:#2a2a2a;color:#eee;">
          <option value="auto">Auto (Best Available)</option>
        </select>
      </div>
      <div class="control-row" style="display:flex;gap:6px;">
        <button id="previewVoiceBtn" class="control-btn toggle" style="font-size:11px;flex:1;">Preview Voice</button>
        <button id="refreshVoices" class="control-btn toggle" style="font-size:11px;flex:0 0 auto;">Refresh</button>
      </div>
    </section>

    <!-- Hidden elements needed by popup.js (kept so JS doesn't error) -->
    <button id="toggleTranslate" style="display:none;"></button>
    <div id="translateControls" style="display:none;"></div>
    <div id="premiumNotice" style="display:none;"></div>
    <button id="previewHindi" style="display:none;"></button>
    <select id="readingLanguage" style="display:none;"><option value="english" selected>English</option></select>
    <select id="hindiVoiceGender" style="display:none;"><option value="male">Male</option></select>

    <section class="tts-controls">
      <div class="control-row">
        <label for="rate">Rate</label>
        <input id="rate" type="range" min="0.5" max="1.5" step="0.1" value="0.8" />
        <span id="rateVal">0.8</span>
      </div>
      <div class="control-row">
        <label for="pitch">Pitch</label>
        <input id="pitch" type="range" min="0.5" max="2" step="0.1" value="1.0" />
        <span id="pitchVal">1.0</span>
      </div>
      <div class="control-row">
        <label>
          <input id="naturalPreset" type="checkbox" checked /> Natural preset
        </label>
      </div>
      <div class="control-row">
        <label>
          <input id="dynamicProsody" type="checkbox" checked /> Dynamic prosody
        </label>
      </div>
    </section>

    <!-- Hidden elements needed by popup.js -->
    <select id="voiceGender" style="display:none;"><option value="male" selected>Male</option></select>
    <select id="voice" style="display:none;"><option>default</option></select>
    <select id="activeVoice" style="display:none;"><option value="male" selected>Male</option></select>
    <select id="femaleVoice" style="display:none;"><option>none</option></select>
    <select id="maleVoice" style="display:none;"><option>none</option></select>
    <input id="preferNaturalVoices" type="checkbox" checked style="display:none;" />
    <input id="autoLang" type="checkbox" style="display:none;" />
    <input id="dialogueAlternate" type="checkbox" style="display:none;" />
    <input id="instantStartEnabled" type="checkbox" style="display:none;" />
    <button id="previewVoice" style="display:none;"></button>
    <button id="pickBestVoices" style="display:none;"></button>

    <section class="tts-controls" style="margin-top:8px;">
      <div class="control-row">
        <label for="voiceEngine" style="font-size:11px;">Voice Engine</label>
        <select id="voiceEngine" style="width:100%;padding:4px 6px;font-size:11px;border:1px solid #555;border-radius:4px;background:#2a2a2a;color:#eee;">
          <option value="browser">Browser TTS (Free)</option>
          <option value="cloud">Google Cloud Neural (Premium)</option>
        </select>
      </div>
      <div id="cloudVoiceControls" style="display:none;">
        <div class="control-row">
          <label for="cloudVoice" style="font-size:11px;">Cloud Voice</label>
          <select id="cloudVoice" style="width:100%;padding:4px 6px;font-size:11px;border:1px solid #555;border-radius:4px;background:#2a2a2a;color:#eee;">
            <option value="en-US-Neural2-J">Male Neural2-J (Best)</option>
            <option value="en-US-Neural2-D">Male Neural2-D</option>
            <option value="en-US-Neural2-A">Male Neural2-A</option>
            <option value="en-US-Neural2-F">Female Neural2-F</option>
            <option value="en-US-Neural2-C">Female Neural2-C</option>
            <option value="en-US-Neural2-H">Female Neural2-H</option>
            <option value="en-US-Wavenet-D">Male Wavenet-D</option>
            <option value="en-US-Wavenet-F">Female Wavenet-F</option>
          </select>
        </div>
        <div class="control-row">
          <label for="cloudTtsApiKey" style="font-size:11px;">Google Cloud API Key</label>
          <input id="cloudTtsApiKey" type="password" placeholder="Paste your Google Cloud TTS API key" style="width:100%;padding:4px 6px;font-size:11px;border:1px solid #555;border-radius:4px;background:#2a2a2a;color:#eee;" />
        </div>
        <div class="control-row" style="display:flex;gap:6px;">
          <button id="previewCloudVoice" class="control-btn toggle" style="font-size:11px;flex:1;">Preview Cloud Voice</button>
          <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener" style="font-size:10px;color:#4fc3f7;align-self:center;">Get API Key</a>
        </div>
      </div>
    </section>

    <input id="geminiApiKey" type="hidden" />

    <button id="settings" class="control-btn important">
      <i>⚙</i>
      Important Settings
    </button>

    <div class="status-container">
      <div id="status" class="status-message">Ready — English</div>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
